[package]
name = "rustcluster"
version = "0.1.0"
edition = "2021"
description = "A Rust-backed Python clustering library"
license = "MIT"

[lib]
name = "rustcluster"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
numpy = "0.23"
ndarray = { version = "0.16", features = ["rayon"] }
rayon = "1"
rand = "0.8"
rand_distr = "0.4"
thiserror = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "debuginfo"
debug = false
