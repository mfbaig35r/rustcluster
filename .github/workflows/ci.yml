name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin numpy pytest
        shell: bash

      - name: Create virtualenv and install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install maturin numpy pytest
        shell: cmd

      - name: Rust tests (no Python features)
        run: cargo test --no-default-features --lib

      - name: Build Python package (Unix)
        if: runner.os != 'Windows'
        run: .venv/bin/maturin develop --release
        shell: bash

      - name: Build Python package (Windows)
        if: runner.os == 'Windows'
        run: .venv\Scripts\maturin develop --release
        shell: cmd

      - name: Python tests (Unix)
        if: runner.os != 'Windows'
        run: .venv/bin/pytest tests/ -v
        shell: bash

      - name: Python tests (Windows)
        if: runner.os == 'Windows'
        run: .venv\Scripts\pytest tests/ -v
        shell: cmd

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy (no Python features)
        run: cargo clippy --no-default-features --lib -- -D warnings
